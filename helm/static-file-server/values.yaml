# Default values for static-file-server.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

revisionHistoryLimit: 3

image:
  repository: somaz940/static-file-server
  pullPolicy: IfNotPresent
  tag: "v0.1.0"

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Static file server configuration (environment variables)
config:
  folder: /web
  port: "8080"
  cors: "false"
  debug: "false"
  allowIndex: "true"
  showListing: "true"
  urlPrefix: ""
  # TLS (optional)
  tlsCert: ""
  tlsKey: ""
  tlsMinVers: ""
  # Access control (optional)
  referrers: ""
  accessKey: ""
  # Custom response headers (optional, comma-separated Key:Value pairs)
  customHeaders: ""

# Extra environment variables
extraEnv: []
# Example:
#   - name: CUSTOM_VAR
#     value: "custom-value"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: files.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: files-tls
  #    hosts:
  #      - files.example.com

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 32Mi

probes:
  liveness:
    enabled: true
    path: /healthz
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    enabled: true
    path: /healthz
    port: http
    initialDelaySeconds: 3
    periodSeconds: 5

# ---------------------------------------------------------------------------
# Storage: 3 modes (choose one)
# ---------------------------------------------------------------------------

# Mode 1: Simple dynamic provisioning (single PVC)
persistence:
  enabled: false
  accessMode: ReadOnlyMany
  size: 1Gi
  storageClass: ""
  existingClaim: ""

# Mode 2: Static provisioning with full control (multiple PVs + PVCs)
# Each PVC item's mountPath is used in the Deployment volumeMounts.
persistentVolumes:
  enabled: false
  items: []
  # Example (NFS):
  #   - name: static-file-server-pv
  #     storage: 5Gi
  #     volumeMode: Filesystem
  #     accessModes:
  #       - ReadWriteMany
  #     reclaimPolicy: Retain
  #     storageClassName: nfs-client
  #     nfs:
  #       server: 10.10.10.5
  #       path: /volume1/nfs
  #
  # Example (HostPath):
  #   - name: local-pv
  #     storage: 10Gi
  #     accessModes:
  #       - ReadWriteOnce
  #     storageClassName: local-storage
  #     hostPath:
  #       path: /data/web
  #       type: DirectoryOrCreate
  #
  # Example (CSI):
  #   - name: csi-pv
  #     storage: 20Gi
  #     accessModes:
  #       - ReadWriteOnce
  #     storageClassName: ebs-sc
  #     csi:
  #       driver: ebs.csi.aws.com
  #       volumeHandle: vol-0123456789abcdef

persistentVolumeClaims:
  enabled: false
  items: []
  # Example:
  #   - name: static-file-server-pvc
  #     accessModes:
  #       - ReadWriteMany
  #     storageClassName: nfs-client
  #     storage: 5Gi
  #     mountPath: /web
  #     volumeName: static-file-server-pv  # bind to specific PV (optional)

# Mode 3: ConfigMap-based content (for small static sites)
content:
  enabled: false
  files: {}
  # Example:
  #   index.html: |
  #     <html><body><h1>Hello!</h1></body></html>

# Extra volumes to add to the deployment
extraVolumes: []
# Example:
#   - name: extra-data
#     configMap:
#       name: my-configmap

# Extra volume mounts to add to the container
extraVolumeMounts: []
# Example:
#   - name: extra-data
#     mountPath: /extra
#     readOnly: true

nodeSelector: {}
tolerations: []
affinity: {}
