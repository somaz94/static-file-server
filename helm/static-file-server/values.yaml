# Default values for static-file-server.
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

revisionHistoryLimit: 3

image:
  repository: somaz940/static-file-server
  pullPolicy: IfNotPresent
  tag: "v0.1.0"

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Static file server configuration (environment variables)
config:
  folder: /web
  port: "8080"
  cors: "false"
  debug: "false"
  allowIndex: "true"
  showListing: "true"
  urlPrefix: ""
  # TLS (optional)
  tlsCert: ""
  tlsKey: ""
  tlsMinVers: ""
  # Access control (optional)
  referrers: ""
  accessKey: ""

# Extra environment variables
extraEnv: []
# Example:
#   - name: CUSTOM_VAR
#     value: "custom-value"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: files.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: files-tls
  #    hosts:
  #      - files.example.com

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 32Mi

probes:
  liveness:
    enabled: true
    path: /
    port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    enabled: true
    path: /
    port: http
    initialDelaySeconds: 3
    periodSeconds: 5

# Persistent volume for serving files (dynamic provisioning)
persistence:
  enabled: false
  accessMode: ReadOnlyMany
  size: 1Gi
  storageClass: ""
  existingClaim: ""
  # Selector for binding to a specific PV (used with static provisioning)
  selector: {}
  # Example:
  #   matchLabels:
  #     app: static-file-server
  #   volumeName: static-file-server-pv

# Static PersistentVolume (for NFS, hostPath, etc.)
persistentVolume:
  enabled: false
  name: ""  # defaults to fullname-pv
  storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  reclaimPolicy: Retain
  storageClass: ""
  # NFS
  nfs:
    server: ""
    path: ""
  # HostPath (for single-node testing)
  hostPath:
    path: ""

# ConfigMap-based content (for small static sites)
content:
  enabled: false
  files: {}
  # Example:
  #   index.html: |
  #     <html><body><h1>Hello!</h1></body></html>

# Extra volumes to add to the deployment
extraVolumes: []
# Example:
#   - name: extra-data
#     configMap:
#       name: my-configmap

# Extra volume mounts to add to the container
extraVolumeMounts: []
# Example:
#   - name: extra-data
#     mountPath: /extra
#     readOnly: true

nodeSelector: {}
tolerations: []
affinity: {}
