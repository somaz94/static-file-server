# Example: NFS static provisioning (manually manage PV + PVC)
#
# Usage:
#   helm install my-server ./helm/static-file-server -f helm/static-file-server/examples/nfs-static.yaml

replicaCount: 2
revisionHistoryLimit: 1

podSecurityContext: {}
securityContext: {}

config:
  folder: /web
  port: "8080"
  cors: "true"
  debug: "true"
  allowIndex: "true"
  showListing: "true"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"                       # <-- Replace
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: file-server.example.com        # <-- Replace
      paths:
        - path: /
          pathType: ImplementationSpecific

resources: {}

probes:
  liveness:
    enabled: true
    path: /
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    enabled: true
    path: /
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

persistentVolumes:
  enabled: true
  items:
    - name: static-file-server-pv
      storage: 5Gi
      volumeMode: Filesystem
      accessModes:
        - ReadWriteMany
      reclaimPolicy: Retain
      storageClassName: nfs-client         # <-- Replace
      nfs:
        server: "10.10.10.5"              # <-- Replace with NFS server IP
        path: "/volume1/nfs"              # <-- Replace with NFS export path

persistentVolumeClaims:
  enabled: true
  items:
    - name: static-file-server-pvc
      accessModes:
        - ReadWriteMany
      storageClassName: nfs-client         # <-- Must match PV
      storage: 5Gi
      mountPath: /web
      volumeName: static-file-server-pv
