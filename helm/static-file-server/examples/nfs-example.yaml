# Example: NFS static provisioning with ingress
#
# Copy and edit:
#   cp nfs-example.yaml nfs-test-values.yaml
#   helm install static-file-server ./helm/static-file-server -f helm/static-file-server/examples/nfs-test-values.yaml

replicaCount: 2
revisionHistoryLimit: 1

podSecurityContext: {}
securityContext: {}

config:
  folder: /web
  port: "8080"
  cors: "true"
  debug: "true"
  allowIndex: "true"
  showListing: "true"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: file-server.example.com    # <-- Replace
      paths:
        - path: /
          pathType: ImplementationSpecific

resources: {}

probes:
  liveness:
    enabled: true
    path: /
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    enabled: true
    path: /
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

# Static PV (NFS)
persistentVolumes:
  enabled: true
  items:
    - name: static-file-server-pv
      storage: 5Gi
      volumeMode: Filesystem
      accessModes:
        - ReadWriteMany
      reclaimPolicy: Retain
      storageClassName: nfs-client       # <-- Replace
      nfs:
        server: "10.0.0.1"              # <-- Replace
        path: "/exports/web"             # <-- Replace

# PVC binding to static PV
persistentVolumeClaims:
  enabled: true
  items:
    - name: static-file-server-pvc
      accessModes:
        - ReadWriteMany
      storageClassName: nfs-client       # <-- Must match PV
      storage: 5Gi
      mountPath: /web
      volumeName: static-file-server-pv  # <-- Must match PV name
