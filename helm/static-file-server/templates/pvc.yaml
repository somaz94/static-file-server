{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "static-file-server.fullname" . }}-data
  labels:
    {{- include "static-file-server.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.selector.volumeName }}
  volumeName: {{ .Values.persistence.selector.volumeName }}
  {{- end }}
  {{- if .Values.persistence.selector.matchLabels }}
  selector:
    matchLabels:
      {{- toYaml .Values.persistence.selector.matchLabels | nindent 6 }}
  {{- end }}
{{- end }}
