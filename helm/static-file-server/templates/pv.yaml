{{- if .Values.persistentVolumes.enabled }}
{{- range .Values.persistentVolumes.items }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .name }}
  labels:
    {{- include "static-file-server.labels" $ | nindent 4 }}
spec:
  capacity:
    storage: {{ .storage }}
  volumeMode: {{ .volumeMode | default "Filesystem" }}
  accessModes:
    {{- toYaml .accessModes | nindent 4 }}
  persistentVolumeReclaimPolicy: {{ .reclaimPolicy | default "Retain" }}
  {{- if .storageClassName }}
  storageClassName: {{ .storageClassName }}
  {{- end }}
  {{- if .nfs }}
  nfs:
    server: {{ .nfs.server }}
    path: {{ .nfs.path }}
  {{- end }}
  {{- if .hostPath }}
  hostPath:
    path: {{ .hostPath.path }}
    {{- if .hostPath.type }}
    type: {{ .hostPath.type }}
    {{- end }}
  {{- end }}
  {{- if .csi }}
  csi:
    driver: {{ .csi.driver }}
    volumeHandle: {{ .csi.volumeHandle }}
    {{- if .csi.fsType }}
    fsType: {{ .csi.fsType }}
    {{- end }}
    {{- if .csi.volumeAttributes }}
    volumeAttributes:
      {{- toYaml .csi.volumeAttributes | nindent 6 }}
    {{- end }}
  {{- end }}
  {{- if .cephfs }}
  cephfs:
    {{- toYaml .cephfs | nindent 4 }}
  {{- end }}
  {{- if .iscsi }}
  iscsi:
    {{- toYaml .iscsi | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
