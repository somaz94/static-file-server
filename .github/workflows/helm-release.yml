name: Helm Chart Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: somaz94/helm-chart-release-action@v1
        with:
          mode: single
          chart_path: ./helm/static-file-server
          gh_pages_url: https://somaz94.github.io/static-file-server/helm-repo
          registry_password: ${{ secrets.GITHUB_TOKEN }}
